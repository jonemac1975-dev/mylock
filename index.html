<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>My Lock</title>

<link rel="manifest" href="/manifest.json">

<!-- iOS ICON -->
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">

<!-- fallback -->
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">

<!-- PWA / iOS MODE -->
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Lock">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="login-box">
    <h2>🔐 My Lock</h2>

    <button id="btnLogin" class="btn-google">
      Login with Google
    </button>

    <input type="password" id="master" placeholder="Master password">

    <button id="btnUnlock" class="btn-unlock">
      Unlock Vault
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;height:100%">
  <div class="sidebar">
    <h3>🔒 My Pass</h3>
    <div class="menu">
      <div data-type="all">💎 All items</div>
      <div data-type="mail">📧 Mail</div>
      <div data-type="card">📘 Card</div>
      <div data-type="bank">🏦 Bank</div>
      <div data-type="wifi">📶 Wifi</div>
      <div data-type="khac">🔒 Another</div>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <input id="search" placeholder="Search...">
      <button id="btnNew">+ New</button>
<button onclick="exportData()">Export</button>
<button onclick="document.getElementById('importFile').click()">Import</button>
      <button id="btnLogout">Logout</button>
    </div>

    <div id="list" class="list"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <select id="type">
      <option value="mail">Mail</option>
      <option value="card">Card</option>
      <option value="bank">Bank</option>
      <option value="wifi">Wifi</option>
      <option value="khac">Another</option>
    </select>

    <input id="title" placeholder="Title">
    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password">

    <button id="btnSave">Save</button>
    <button id="btnCancel">Cancel</button>
  </div>
</div>
<!-- TOAST -->
<div id="toast"></div>

<!-- IMPORT FILE -->
<input type="file" id="importFile" style="display:none">
<script type="module" src="js/app.js"></script>
</body>
</html>
